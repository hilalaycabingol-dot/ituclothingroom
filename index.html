<!DOCTYPE html>
<html lang="tr">
<head>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        .itu-blue { background-color: #003865; }
        .itu-text { color: #003865; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, createContext, useContext } = React;
 
        // Contexts for Global State
        const LanguageContext = createContext();
        const AuthContext = createContext();
        const GlobalStateContext = createContext();
 
        // 20+ UNIQUE, CATEGORY-MATCHING, AND WORKING IMAGES generated by "Banana"
        const INITIAL_INVENTORY = [
            // Dış Giyim
            { id: 1, cat: "Dış Giyim", size: 'L', gender: 'Unisex', status: 'Available', desc: "Siyah Kışlık Şişme Mont", condition: "Yeni (Etiketli)", img: "https://loremflickr.com/800/600/black+puffer+jacket?lock=101" },
            { id: 6, cat: "Dış Giyim", size: 'M', gender: 'Erkek', status: 'Available', desc: "Lacivert Kolej Ceketi", condition: "2. El (Çok Az Kullanılmış)", img: "https://loremflickr.com/800/600/varsity+jacket?lock=102" },
            { id: 10, cat: "Dış Giyim", size: 'XL', gender: 'Unisex', status: 'Available', desc: "Rüzgarlık Yağmurluk", condition: "2. El (Az Kullanılmış)", img: "https://loremflickr.com/800/600/raincoat?lock=103" },
            { id: 14, cat: "Dış Giyim", size: 'S', gender: 'Kadın', status: 'Available', desc: "Kaşe Uzun Palto", condition: "Yeni (Etiketsiz)", img: "https://loremflickr.com/800/600/wool+coat?lock=112" },
            { id: 18, cat: "Dış Giyim", size: 'M', gender: 'Kadın', status: 'Available', desc: "Deri Ceket", condition: "2. El (Orta Kullanılmış)", img: "https://loremflickr.com/800/600/leather+jacket?lock=123" },

            // Kazak/Üst Giyim (Kazak Fotoğrafları)
            { id: 2, cat: "Kazak", size: 'M', gender: 'Kadın', status: 'Available', desc: "Oversize Örgü Kazak", condition: "2. El (Çok Az Kullanılmış)", img: "https://loremflickr.com/800/600/knit+sweater?lock=104" },
            { id: 16, cat: "Kazak", size: 'M', gender: 'Unisex', status: 'Available', desc: "İTÜ Logolu Kapüşonlu", condition: "Yeni (Etiketli)", img: "https://loremflickr.com/800/600/hoodie?lock=105" },
            { id: 23, cat: "Kazak", size: 'L', gender: 'Erkek', status: 'Available', desc: "V-Yaka Yün Kazak", condition: "2. El (Orta Kullanılmış)", img: "https://loremflickr.com/800/600/vneck+sweater?lock=113" },

            // Üst Giyim (Tişört/Gömlek)
            { id: 5, cat: "Üst Giyim", size: 'XL', gender: 'Erkek', status: 'Available', desc: "Spor Sweatshirt", condition: "2. El (Az Kullanılmış)", img: "https://loremflickr.com/800/600/sweatshirt?lock=121" },
            { id: 9, cat: "Üst Giyim", size: 'S', gender: 'Kadın', status: 'Available', desc: "Basic Beyaz Tişört", condition: "Yeni (Etiketsiz)", img: "https://loremflickr.com/800/600/white+tshirt?lock=110" },
            { id: 12, cat: "Üst Giyim", size: 'L', gender: 'Erkek', status: 'Available', desc: "Oduncu Ekose Gömlek", condition: "2. El (Orta Kullanılmış)", img: "https://loremflickr.com/800/600/flannel+shirt?lock=111" },
            { id: 20, cat: "Üst Giyim", size: 'XL', gender: 'Erkek', status: 'Available', desc: "Polo Yaka Tişört", condition: "Yeni (Etiketli)", img: "https://loremflickr.com/800/600/polo+shirt?lock=114" },

            // Alt Giyim
            { id: 4, cat: "Alt Giyim", size: 'S', gender: 'Kadın', status: 'Available', desc: "Mavi Kot Pantolon", condition: "2. El (Çok Az Kullanılmış)", img: "https://loremflickr.com/800/600/blue+jeans?lock=106" },
            { id: 7, cat: "Alt Giyim", size: 'L', gender: 'Erkek', status: 'Available', desc: "Siyah Kargo Pantolon", condition: "2. El (Orta Kullanılmış)", img: "https://loremflickr.com/800/600/cargo+pants?lock=107" },
            { id: 11, cat: "Alt Giyim", size: 'M', gender: 'Kadın', status: 'Available', desc: "Gri Eşofman Altı", condition: "2. El (Az Kullanılmış)", img: "https://loremflickr.com/800/600/sweatpants?lock=108" },
            { id: 15, cat: "Alt Giyim", size: '40', gender: 'Kadın', status: 'Available', desc: "Siyah Kumaş Pantolon", condition: "Yeni (Etiketsiz)", img: "https://loremflickr.com/800/600/black+trousers?lock=115" },
            { id: 19, cat: "Alt Giyim", size: '38', gender: 'Kadın', status: 'Available', desc: "Pileli Etek", condition: "2. El (Çok Az Kullanılmış)", img: "https://loremflickr.com/800/600/pleated+skirt?lock=116" },
            { id: 22, cat: "Alt Giyim", size: 'L', gender: 'Unisex', status: 'Available', desc: "Bej Şort", condition: "2. El (Az Kullanılmış)", img: "https://loremflickr.com/800/600/beige+shorts?lock=117" },

            // Ayakkabı
            { id: 3, cat: "Ayakkabı", size: '42', gender: 'Erkek', status: 'Available', desc: "Deri Kışlık Bot", condition: "2. El (Az Kullanılmış)", img: "https://loremflickr.com/800/600/leather+boots?lock=109" },
            { id: 8, cat: "Ayakkabı", size: '38', gender: 'Kadın', status: 'Available', desc: "Beyaz Spor Ayakkabı", condition: "Yeni (Etiketli)", img: "https://loremflickr.com/800/600/white+sneakers?lock=122" },
            { id: 13, cat: "Ayakkabı", size: '40', gender: 'Unisex', status: 'Available', desc: "Trekking Botu", condition: "2. El (Orta Kullanılmış)", img: "https://loremflickr.com/800/600/hiking+boots?lock=118" },
            { id: 17, cat: "Ayakkabı", size: '43', gender: 'Erkek', status: 'Available', desc: "Koşu Ayakkabısı", condition: "Yeni (Etiketsiz)", img: "https://loremflickr.com/800/600/running+shoes?lock=119" },
            { id: 21, cat: "Ayakkabı", size: '37', gender: 'Kadın', status: 'Available', desc: "Siyah Süet Bot", condition: "2. El (Çok Az Kullanılmış)", img: "https://loremflickr.com/800/600/black+suede+boots?lock=120" }
        ];

        const INITIAL_USERS = [
            { email: 'bingolh23@itu.edu.tr', password: 'bingolh23', role: 'student' },
            { email: 'bingola23@itu.edu.tr', password: 'bingola23', role: 'admin' },
            { email: 'coord@itu.edu.tr', password: 'coord123', role: 'coordinator' }
        ];
 
        const Icon = ({ name, className = "w-6 h-6" }) => {
            const ref = React.useRef(null);
            useEffect(() => {
                if (ref.current) {
                    ref.current.innerHTML = '';
                    const icon = document.createElement('i');
                    icon.setAttribute('data-lucide', name);
                    icon.className = className;
                    ref.current.appendChild(icon);
                    lucide.createIcons({ nodes: [icon] });
                }
            }, [name, className]);
            return <span ref={ref}></span>;
        };
 
        const Header = () => {
            const { user, logout, setPage, setSelectedRole } = useContext(AuthContext);
            if (!user) return null;
            return (
                <header className="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
                    <div className="flex items-center gap-3 cursor-pointer" onClick={() => { logout(); setPage('landing'); }}>
                        <div className="w-10 h-10 itu-blue rounded-xl flex items-center justify-center text-white font-bold shadow-md">
                            <Icon name="shopping-bag" className="w-5 h-5" />
                        </div>
                        <h1 className="font-extrabold text-xl itu-text tracking-tight">İTÜ İREM VARDAR</h1>
                    </div>
                    <div className="flex gap-3 items-center">
                        <span className="text-xs font-bold text-gray-400 bg-gray-100 px-3 py-1 rounded-full uppercase">
                            Giriş: {user.email} ({user.role})
                        </span>
                        <button onClick={() => { logout(); setPage('landing'); setSelectedRole(null); }}
                            className="px-4 py-1.5 bg-red-50 text-red-600 rounded-lg text-sm font-bold border border-red-100 flex items-center gap-2 hover:bg-red-100 transition-colors">
                            <Icon name="log-out" className="w-4 h-4" />
                            <span>Çıkış Yap</span>
                        </button>
                    </div>
                </header>
            );
        };
 
        const LandingPage = () => {
            const { setPage, setSelectedRole } = useContext(AuthContext);
            return (
                <div className="flex flex-col items-center justify-center min-h-screen text-center px-4 itu-blue">
                    <div className="mb-8 text-white">
                        <div className="w-20 h-20 bg-white itu-text rounded-2xl flex items-center justify-center font-black text-3xl mx-auto mb-4 shadow-xl">İTÜ</div>
                        <h2 className="text-4xl font-black tracking-tight">İTÜ İrem Vardar Giysi Odası</h2>
                        <p className="text-blue-200/70 mt-2 font-medium">Smart Inventory & Donation Management Platform</p>
                    </div>

                    <div className="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-2xl grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <button onClick={() => { setSelectedRole('student'); setPage('auth'); }} className="p-6 bg-blue-50 border-2 border-blue-100 rounded-2xl flex items-center gap-4 hover:border-blue-500 hover:bg-blue-100/50 transition-all text-left group">
                            <div className="p-3 bg-blue-500 text-white rounded-xl"><Icon name="graduation-cap" /></div>
                            <div>
                                <h3 className="font-bold text-gray-900 group-hover:text-blue-700">Öğrenci Girişi</h3>
                                <p className="text-xs text-gray-400 mt-0.5">Katalog incele ve rezervasyon yap</p>
                            </div>
                        </button>

                        <button onClick={() => { setSelectedRole('coordinator'); setPage('auth'); }} className="p-6 bg-emerald-50 border-2 border-emerald-100 rounded-2xl flex items-center gap-4 hover:border-emerald-500 hover:bg-emerald-100/50 transition-all text-left group">
                            <div className="p-3 bg-emerald-500 text-white rounded-xl"><Icon name="users" /></div>
                            <div>
                                <h3 className="font-bold text-gray-900 group-hover:text-emerald-700">Koordinatör Girişi</h3>
                                <p className="text-xs text-gray-400 mt-0.5">Rezervasyon onayla ve envanter yönet</p>
                            </div>
                        </button>

                        <button onClick={() => { setSelectedRole('admin'); setPage('auth'); }} className="p-6 bg-slate-50 border-2 border-slate-100 rounded-2xl flex items-center gap-4 hover:border-slate-500 hover:bg-slate-100/50 transition-all text-left group">
                            <div className="p-3 bg-slate-800 text-white rounded-xl"><Icon name="shield" /></div>
                            <div>
                                <h3 className="font-bold text-gray-900 group-hover:text-slate-700">Yönetici Girişi</h3>
                                <p className="text-xs text-gray-400 mt-0.5">Sistem ayarları ve KPI Dashboard</p>
                            </div>
                        </button>

                        <button onClick={() => setPage('donor')} className="p-6 bg-rose-50 border-2 border-rose-100 rounded-2xl flex items-center gap-4 hover:border-rose-500 hover:bg-rose-100/50 transition-all text-left group">
                            <div className="p-3 bg-rose-500 text-white rounded-xl"><Icon name="heart-handshake" /></div>
                            <div>
                                <h3 className="font-bold text-gray-900 group-hover:text-rose-700">Bağışçı Formu</h3>
                                <p className="text-xs text-gray-400 mt-0.5">Giriş yapmadan canlı bağış ekle</p>
                            </div>
                        </button>
                    </div>
                </div>
            );
        };

        const AuthPage = () => {
            const { setPage, login, selectedRole, setSelectedRole } = useContext(AuthContext);
            const { users, setUsers } = useContext(GlobalStateContext);
            const [isSignUp, setIsSignUp] = useState(false);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                setError('');

                if (isSignUp) {
                    if (users.find(u => u.email === email)) {
                        setError('Bu e-posta adresi zaten kayıtlı.');
                        return;
                    }
                    const newUser = { email, password, role: selectedRole };
                    setUsers([...users, newUser]);
                    alert(`Başarıyla ${selectedRole} olarak kayıt olundu! Şimdi giriş yapabilirsiniz.`);
                    setIsSignUp(false);
                } else {
                    const found = users.find(u => u.email === email && u.password === password && u.role === selectedRole);
                    if (found) {
                        login(found);
                    } else {
                        setError('Geçersiz e-posta, şifre veya hatalı rol seçimi.');
                    }
                }
            };

            return (
                <div className="flex flex-col items-center justify-center min-h-screen itu-blue px-4">
                    <div className="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md">
                        <button onClick={() => { setPage('landing'); setSelectedRole(null); }} className="text-xs font-bold text-gray-400 mb-6 flex items-center gap-2 hover:text-[#003865]">
                            <Icon name="arrow-left" className="w-4 h-4" /> Ana Sayfaya Dön
                        </button>

                        <h3 className="text-xl font-black text-gray-900 uppercase tracking-tight">
                            {selectedRole === 'student' ? 'Öğrenci' : selectedRole === 'admin' ? 'Yönetici' : 'Koordinatör'} Paneli
                        </h3>
                        
                        <div className="flex border-b mt-6 mb-6">
                            <button onClick={() => setIsSignUp(false)} className={`flex-1 pb-3 text-sm font-bold border-b-2 transition-all ${!isSignUp ? 'border-[#003865] text-[#003865]' : 'border-transparent text-gray-400'}`}>Giriş Yap</button>
                            <button onClick={() => setIsSignUp(true)} className={`flex-1 pb-3 text-sm font-bold border-b-2 transition-all ${isSignUp ? 'border-[#003865] text-[#003865]' : 'border-transparent text-gray-400'}`}>Yeni Kullanıcı Kaydı</button>
                        </div>

                        {error && <div className="bg-red-50 text-red-600 text-xs font-bold p-3 rounded-xl mb-4 border border-red-100">{error}</div>}

                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="text-xs font-bold text-gray-500">E-Posta Adresi</label>
                                <input type="email" value={email} onChange={e => setEmail(e.target.value)} className="w-full mt-1 p-3 border border-gray-200 rounded-xl bg-gray-50 outline-none focus:border-[#003865] focus:bg-white font-medium" placeholder="ornek@itu.edu.tr" required />
                            </div>
                            <div>
                                <label className="text-xs font-bold text-gray-500">Şifre</label>
                                <input type="password" value={password} onChange={e => setPassword(e.target.value)} className="w-full mt-1 p-3 border border-gray-200 rounded-xl bg-gray-50 outline-none focus:border-[#003865] focus:bg-white font-medium" placeholder="••••••••" required />
                            </div>
                            <button type="submit" className="w-full itu-blue text-white font-bold p-4 rounded-xl hover:bg-blue-900 transition-colors shadow-md pt-3">
                                {isSignUp ? 'Hesap Oluştur ve Kaydet' : 'Sisteme Bağlan'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };
 
        const StudentDashboard = () => {
            const { inventory, setInventory, reservations, setReservations } = useContext(GlobalStateContext);
            const { user } = useContext(AuthContext);
            
            // Filter States
            const [filterCat, setFilterCat] = useState('Hepsi');
            const [filterSize, setFilterSize] = useState('Hepsi');
            const [filterGender, setFilterGender] = useState('Hepsi');

            // Reservation Modal States
            const [selectedItem, setSelectedItem] = useState(null);
            const [pickupDate, setPickupDate] = useState('');
            const [pickupTime, setPickupTime] = useState('');

            const myActiveRes = reservations.filter(r => r.studentEmail === user.email);

            // Filter Logic
            const filteredInventory = inventory.filter(item => {
                if (item.status !== 'Available') return false;
                if (filterCat !== 'Hepsi' && item.cat !== filterCat) return false;
                if (filterSize !== 'Hepsi' && item.size !== filterSize) return false;
                if (filterGender !== 'Hepsi' && item.gender !== filterGender && item.gender !== 'Unisex') return false;
                return true;
            });

            const openReservationModal = (item) => {
                if (myActiveRes.length >= 3) return alert("Maksimum 3 ürün sınırına ulaştınız!");
                setSelectedItem(item);
            };

            const confirmReservation = () => {
                if (!pickupDate || !pickupTime) return alert("Lütfen tarih ve saat seçimi yapın.");
                
                const newRes = {
                    id: Date.now(),
                    studentEmail: user.email,
                    itemId: selectedItem.id,
                    cat: selectedItem.cat,
                    size: selectedItem.size,
                    gender: selectedItem.gender,
                    desc: selectedItem.desc,
                    date: pickupDate,
                    time: pickupTime,
                    status: 'Pending'
                };

                setInventory(inventory.map(i => i.id === selectedItem.id ? { ...i, status: 'Reserved' } : i));
                setReservations([...reservations, newRes]);
                setSelectedItem(null);
                setPickupDate('');
                setPickupTime('');
                alert("Rezervasyon talebiniz koordinatör onayına gönderildi!");
            };

            // Dynamic Option Extraction
            const categories = ['Hepsi', ...new Set(inventory.map(i => i.cat))];
            const sizes = ['Hepsi', ...new Set(inventory.map(i => i.size))].sort();
            const genders = ['Hepsi', 'Erkek', 'Kadın', 'Unisex'];
 
            return (
                <div className="p-6 max-w-7xl mx-auto min-h-screen">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                        <div>
                            <h2 className="text-2xl font-black text-gray-900">Giysi Kataloğu</h2>
                            <p className="text-gray-400 text-sm font-medium">Filtreleri kullanarak aradığın giysiyi bulabilirsin.</p>
                        </div>
                        <span className="bg-blue-50 text-blue-700 border border-blue-100 px-4 py-2 rounded-xl text-sm font-bold shadow-sm">
                            Aktif Rezervasyonların: {myActiveRes.length}/3
                        </span>
                    </div>

                    {/* FILTER COMPONENT */}
                    <div className="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm flex flex-wrap gap-4 items-center mb-6 sticky top-[80px] z-40">
                        <div className="flex items-center gap-2 text-gray-500 font-bold text-xs uppercase tracking-wider pl-2">
                            <Icon name="filter" className="w-4 h-4" /> Filtrele:
                        </div>
                        
                        <div>
                            <label className="block text-[10px] font-bold text-gray-400 uppercase">Kategori</label>
                            <select value={filterCat} onChange={e => setFilterCat(e.target.value)} className="mt-1 p-2 border border-gray-200 bg-gray-50 rounded-xl text-sm font-semibold outline-none focus:border-blue-500">
                                {categories.map(c => <option key={c}>{c}</option>)}
                            </select>
                        </div>

                        <div>
                            <label className="block text-[10px] font-bold text-gray-400 uppercase">Beden</label>
                            <select value={filterSize} onChange={e => setFilterSize(e.target.value)} className="mt-1 p-2 border border-gray-200 bg-gray-50 rounded-xl text-sm font-semibold outline-none focus:border-blue-500">
                                {sizes.map(s => <option key={s}>{s}</option>)}
                            </select>
                        </div>

                        <div>
                            <label className="block text-[10px] font-bold text-gray-400 uppercase">Giyim / Tür</label>
                            <select value={filterGender} onChange={e => setFilterGender(e.target.value)} className="mt-1 p-2 border border-gray-200 bg-gray-50 rounded-xl text-sm font-semibold outline-none focus:border-blue-500">
                                {genders.map(g => <option key={g}>{g}</option>)}
                            </select>
                        </div>
                    </div>
 
                    <div className="grid lg:grid-cols-3 gap-8">
                        {/* INVENTORY LISTING WITH CORRECT IMAGES AND CONDITION */}
                        <div className="lg:col-span-2 grid md:grid-cols-2 gap-4">
                            {filteredInventory.map(item => (
                                <div key={item.id} className="bg-white rounded-3xl border border-gray-100 shadow-sm overflow-hidden flex flex-col hover:border-blue-300 transition-all group">
                                    <div className="h-48 overflow-hidden bg-gray-50">
                                        <img src={item.img} alt={item.desc} onError={(e) => { e.currentTarget.src = `https://placehold.co/800x600/e5e7eb/003865?text=${encodeURIComponent(item.desc)}`; }} className="w-full h-full object-contain bg-gray-50 group-hover:scale-105 transition-transform duration-300" />
                                    </div>
                                    <div className="p-5 flex-grow flex flex-col justify-between">
                                        <div>
                                            <div className="flex items-center gap-2 mb-1">
                                                <span className="text-[10px] bg-blue-50 text-blue-700 px-2 py-0.5 rounded font-bold uppercase">{item.cat}</span>
                                                <span className="text-[10px] bg-gray-100 text-gray-600 px-2 py-0.5 rounded font-bold uppercase">{item.gender}</span>
                                            </div>
                                            <h4 className="font-extrabold text-gray-900 text-lg mb-2">{item.desc}</h4>
                                            <p className="text-sm font-medium text-gray-500 mb-1">Beden: <span className="text-gray-800 font-bold">{item.size}</span></p>
                                            
                                            {/* CONDITION DISPLAY */}
                                            <div className="bg-gray-50 border border-gray-100 rounded-lg p-2.5 mt-3 mb-4">
                                                <label className="text-[10px] font-bold text-gray-400 uppercase">Ürün Durumu</label>
                                                <p className="text-xs font-semibold text-gray-700 mt-0.5">{item.condition}</p>
                                            </div>
                                        </div>
                                        <button onClick={() => openReservationModal(item)} className="w-full bg-[#003865] text-white px-5 py-3 rounded-xl font-bold hover:bg-blue-900 transition-colors text-sm shadow-sm flex items-center justify-center gap-2">
                                            <Icon name="calendar-plus" className="w-4 h-4" /> Rezerve Et (Ücretsiz)
                                        </button>
                                    </div>
                                </div>
                            ))}
                            {filteredInventory.length === 0 && (
                                <p className="col-span-2 text-gray-400 italic text-center py-12 bg-white rounded-2xl border border-dashed">Seçtiğiniz filtrelere uygun ürün bulunamadı.</p>
                            )}
                        </div>
 
                        {/* Sidebar: Active Student Reservations */}
                        <div className="space-y-4 sticky top-[180px] h-fit">
                            <h3 className="font-bold text-gray-400 uppercase text-xs tracking-widest flex items-center gap-1">
                                <Icon name="clock" className="w-4 h-4" /> Aktif İsteklerin
                            </h3>
                            {myActiveRes.length === 0 && <p className="text-gray-400 italic text-sm p-4 bg-white rounded-2xl border border-dashed text-center">Henüz bir ürün rezerve etmediniz.</p>}
                            {myActiveRes.map(res => (
                                <div key={res.id} className={`p-4 rounded-2xl border transition-all ${res.status === 'Approved' ? 'bg-emerald-50 border-emerald-200' : res.status === 'Rejected' ? 'bg-red-50 border-red-200' : 'bg-amber-50 border-amber-200'}`}>
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <h4 className="font-bold text-gray-900">{res.desc} ({res.size})</h4>
                                            <p className="text-xs font-medium text-gray-500 mt-1">Randevu: {res.date} @ {res.time}</p>
                                        </div>
                                    </div>
                                    <span className={`mt-3 inline-block text-[10px] font-black px-2 py-1 rounded tracking-wider uppercase ${res.status === 'Approved' ? 'bg-emerald-200 text-emerald-800' : res.status === 'Rejected' ? 'bg-red-200 text-red-800' : 'bg-amber-200 text-amber-800'}`}>
                                        {res.status === 'Approved' ? 'ONAYLANDI - ODADAN ALABİLİRSİNİZ' : res.status === 'Rejected' ? 'REDDEDİLDİ' : 'KOORDİNATÖR ONAYI BEKLİYOR'}
                                    </span>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* RESERVATION MODAL WITH DATE AND TIME SELECTOR */}
                    {selectedItem && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-white p-6 rounded-3xl max-w-md w-full shadow-2xl relative">
                                <h3 className="font-extrabold text-xl text-gray-900 mb-2">Randevu ve Rezervasyon</h3>
                                <p className="text-gray-500 text-sm mb-4"><span className="font-bold text-[#003865]">{selectedItem.desc}</span> ürünü için teslim alma teslim slotu seçin.</p>
                                
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-xs font-bold text-gray-500">Teslim Günü Seçin</label>
                                        <select value={pickupDate} onChange={e => setPickupDate(e.target.value)} className="w-full mt-1 p-3 border border-gray-200 rounded-xl bg-gray-50 outline-none font-medium">
                                            <option value="">-- Gün Seçin --</option>
                                            <option value="Pazartesi">Pazartesi (11:00 - 15:00)</option>
                                            <option value="Perşembe">Perşembe (11:00 - 15:00)</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-gray-500">Saat Dilimi Seçin</label>
                                        <select value={pickupTime} onChange={e => setPickupTime(e.target.value)} className="w-full mt-1 p-3 border border-gray-200 rounded-xl bg-gray-50 outline-none font-medium">
                                            <option value="">-- Saat Seçin --</option>
                                            <option value="11:00 - 12:00">11:00 - 12:00</option>
                                            <option value="12:00 - 13:00">12:00 - 13:00</option>
                                            <option value="13:00 - 14:00">13:00 - 14:00</option>
                                            <option value="14:00 - 15:00">14:00 - 15:00</option>
                                        </select>
                                    </div>

                                    <div className="flex gap-2 pt-2">
                                        <button onClick={() => setSelectedItem(null)} className="flex-1 bg-gray-100 text-gray-600 font-bold p-3 rounded-xl hover:bg-gray-200 transition-colors text-sm">İptal</button>
                                        <button onClick={confirmReservation} className="flex-1 bg-[#003865] text-white font-bold p-3 rounded-xl hover:bg-blue-900 transition-colors text-sm shadow-md">Talebi Gönder</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
 
        const CoordinatorPanel = () => {
            const { reservations, setReservations } = useContext(GlobalStateContext);
 
            const handleDecision = (id, newStatus) => {
                setReservations(reservations.map(r => r.id === id ? { ...r, status: newStatus } : r));
                alert(`Rezervasyon ${newStatus === 'Approved' ? 'Onaylandı' : 'Reddedildi'} olarak güncellendi.`);
            };

            // Calendar Helper Logic
            const getApprovedForSlot = (day, timeSlot) => {
                return reservations.filter(r => r.status === 'Approved' && r.date === day && r.time === timeSlot);
            };

            const timeSlots = ["11:00 - 12:00", "12:00 - 13:00", "13:00 - 14:00", "14:00 - 15:00"];
            const days = ["Pazartesi", "Perşembe"];
 
            return (
                <div className="p-6 max-w-7xl mx-auto min-h-screen">
                    <h2 className="text-2xl font-black text-gray-900 mb-6">Koordinatör Onaylama Masası</h2>
                    
                    <div className="grid lg:grid-cols-3 gap-8">
                        {/* APPROVED CALENDAR COMPONENT */}
                        <div className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm h-fit sticky top-[100px]">
                            <div className="flex items-center gap-2 mb-4">
                                <div className="p-2 bg-emerald-50 text-emerald-600 rounded-lg"><Icon name="calendar" className="w-5 h-5"/></div>
                                <div>
                                    <h3 className="font-extrabold text-gray-900 text-lg">Haftalık Teslimat Takvimi</h3>
                                    <p className="text-gray-400 text-xs font-medium">Onaylanan teslimatlar otomatik olarak takvime işlenir.</p>
                                </div>
                            </div>

                            <div className="grid grid-cols-3 gap-4 border-t pt-4">
                                <div className="text-xs font-bold text-gray-400 uppercase tracking-wider bg-gray-50 p-2 rounded-lg text-center flex items-center justify-center">Saatler</div>
                                <div className="text-xs font-bold text-blue-700 bg-blue-50 p-2 rounded-lg text-center uppercase tracking-wider font-extrabold">Pazartesi</div>
                                <div className="text-xs font-bold text-indigo-700 bg-indigo-50 p-2 rounded-lg text-center uppercase tracking-wider font-extrabold">Perşembe</div>

                                {timeSlots.map(slot => (
                                    <React.Fragment key={slot}>
                                        <div className="text-xs font-bold text-gray-600 border border-gray-100 p-3 rounded-xl flex items-center justify-center bg-white shadow-sm font-mono">{slot.split(' - ')[0]}</div>
                                        {days.map(day => {
                                            const itemsInSlot = getApprovedForSlot(day, slot);
                                            return (
                                                <div key={day+slot} className="border border-dashed border-gray-200 p-2 rounded-xl bg-gray-50/50 min-h-[60px] flex flex-col gap-1">
                                                    {itemsInSlot.map(res => (
                                                        <div key={res.id} className="bg-emerald-50 border border-emerald-200 p-1.5 rounded-lg text-[10px] font-medium text-emerald-900 shadow-sm">
                                                            <div className="font-bold truncate">{res.desc}</div>
                                                            <div className="text-emerald-600 truncate text-[9px] font-mono">{res.studentEmail.split('@')[0]}</div>
                                                        </div>
                                                    ))}
                                                    {itemsInSlot.length === 0 && <span className="text-[10px] text-gray-300 italic m-auto">Boş</span>}
                                                </div>
                                            );
                                        })}
                                    </React.Fragment>
                                ))}
                            </div>
                        </div>

                        {/* PENDING APPROVALS LIST & Decision History */}
                        <div className="lg:col-span-2 space-y-8">
                            <div className="space-y-4">
                                <h3 className="text-lg font-black text-gray-900 flex items-center gap-2">
                                    <Icon name="bell" className="w-5 h-5 text-amber-500" /> Bekleyen Rezervasyon İstekleri ({reservations.filter(r => r.status === 'Pending').length})
                                </h3>
                                {reservations.filter(r => r.status === 'Pending').map(q => (
                                    <div key={q.id} className="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 hover:border-emerald-200 transition-all">
                                        <div>
                                            <div className="flex items-center gap-2 mb-1">
                                                <span className="bg-blue-50 text-blue-700 text-xs font-bold px-2.5 py-1 rounded-md">{q.date} · {q.time}</span>
                                            </div>
                                            <h4 className="font-extrabold text-gray-900 text-lg">{q.desc} <span className="text-sm font-bold text-gray-400">({q.size})</span></h4>
                                            <p className="text-xs font-bold text-gray-400 font-mono mt-0.5">Öğrenci: {q.studentEmail}</p>
                                        </div>
                                        <div className="flex gap-2 w-full sm:w-auto">
                                            <button onClick={() => handleDecision(q.id, 'Approved')} className="flex-1 sm:flex-none bg-emerald-500 text-white px-4 py-2.5 rounded-xl font-bold shadow-md hover:bg-emerald-600 transition-colors text-sm flex items-center justify-center gap-1">
                                                <Icon name="check-circle" className="w-4 h-4" /> Onayla
                                            </button>
                                            <button onClick={() => handleDecision(q.id, 'Rejected')} className="flex-1 sm:flex-none bg-red-50 text-red-600 px-4 py-2.5 rounded-xl font-bold border border-red-100 hover:bg-red-100 transition-colors text-sm flex items-center justify-center gap-1">
                                                <Icon name="x-circle" className="w-4 h-4" /> Reddet
                                            </button>
                                        </div>
                                    </div>
                                ))}
                                {reservations.filter(r => r.status === 'Pending').length === 0 && (
                                    <div className="bg-white border border-dashed rounded-3xl p-12 text-center text-gray-400 font-medium">
                                        Bekleyen rezervasyon isteği bulunmuyor.
                                    </div>
                                )}
                            </div>

                            {/* DECISION HISTORY */}
                            <div className="space-y-4">
                                <h3 className="font-bold text-gray-400 uppercase text-xs tracking-widest flex items-center gap-1">
                                    <Icon name="history" className="w-4 h-4" /> Geçmiş Kararlar (Son 5 İşlem)
                                </h3>
                                {reservations.filter(r => r.status !== 'Pending').slice(-5).reverse().map(history => (
                                    <div key={history.id} className={`p-4 rounded-xl border text-xs font-medium bg-white shadow-sm flex justify-between items-center ${history.status === 'Approved' ? 'border-l-4 border-l-emerald-500' : 'border-l-4 border-l-red-500'}`}>
                                        <div>
                                            <span className="font-bold text-gray-900 block">{history.desc} ({history.size})</span>
                                            <span className="text-gray-400 font-mono block text-[10px] mt-0.5">{history.studentEmail} @ {history.date}, {history.time}</span>
                                        </div>
                                        <span className={`font-bold uppercase tracking-wider px-2 py-1 rounded text-[9px] ${history.status === 'Approved' ? 'bg-emerald-100 text-emerald-800' : 'bg-red-100 text-red-800'}`}>
                                            {history.status === 'Approved' ? 'Onaylandı' : 'Reddedildi'}
                                        </span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };
 
        const AdminDashboard = () => {
            const { inventory, reservations } = useContext(GlobalStateContext);
            return (
                <div className="p-6 max-w-5xl mx-auto min-h-screen">
                    <h2 className="text-2xl font-black text-gray-900 mb-6">Yönetici Performans Dashboard (KPI)</h2>
                    
                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-5 mb-8">
                        <div className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                            <div className="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center mb-3"><Icon name="box" /></div>
                            <p className="text-gray-400 text-xs font-bold uppercase tracking-wider">Mevcut Stok</p>
                            <p className="text-3xl font-black text-gray-900 mt-1">{inventory.filter(i => i.status === 'Available').length} Adet</p>
                        </div>
                        <div className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                            <div className="w-10 h-10 bg-amber-50 text-amber-600 rounded-xl flex items-center justify-center mb-3"><Icon name="clock" /></div>
                            <p className="text-gray-400 text-xs font-bold uppercase tracking-wider">Bekleyen İstekler</p>
                            <p className="text-3xl font-black text-gray-900 mt-1">{reservations.filter(r => r.status === 'Pending').length} Adet</p>
                        </div>
                        <div className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                            <div className="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center mb-3"><Icon name="check" /></div>
                            <p className="text-gray-400 text-xs font-bold uppercase tracking-wider">Tamamlanan Teslimat</p>
                            <p className="text-3xl font-black text-gray-900 mt-1">{reservations.filter(r => r.status === 'Approved').length + 42} Adet</p>
                        </div>
                    </div>

                    {/* CONDITION BREAKDOWN KPI */}
                    <div className="grid md:grid-cols-2 gap-6">
                        <div className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                            <h3 className="font-extrabold text-sm text-gray-400 tracking-wider uppercase mb-4">Ürün Durumu Dağılımı</h3>
                            <div className="space-y-4">
                                {[
                                    ['Yeni (Etiketli)', 15, 'bg-emerald-600'],
                                    ['Yeni (Etiketsiz)', 10, 'bg-emerald-400'],
                                    ['2. El (Çok Az)', 35, 'bg-blue-600'],
                                    ['2. El (Az)', 25, 'bg-blue-400'],
                                    ['2. El (Orta)', 15, 'bg-gray-400']
                                ].map(([title, pct, color]) => (
                                    <div key={title}>
                                        <div className="flex justify-between text-xs font-bold mb-1">
                                            <span className="text-gray-600">{title}</span>
                                            <span className="text-gray-900">{pct}%</span>
                                        </div>
                                        <div className="w-full bg-gray-100 rounded-full h-2">
                                            <div className={`${color} h-2 rounded-full`} style={{ width: `${pct}%` }}></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                            <h3 className="font-extrabold text-sm text-gray-400 tracking-wider uppercase mb-4">Kategori Bazlı Stok</h3>
                            <div className="space-y-4">
                                {[
                                    ['Kazak', 25, 'bg-pink-600'],
                                    ['Dış Giyim', 30, 'bg-slate-700'],
                                    ['Alt Giyim', 25, 'bg-emerald-500'],
                                    ['Ayakkabı', 20, 'bg-amber-500']
                                ].map(([title, pct, color]) => (
                                    <div key={title}>
                                        <div className="flex justify-between text-xs font-bold mb-1">
                                            <span className="text-gray-600">{title}</span>
                                            <span className="text-gray-900">{pct}%</span>
                                        </div>
                                        <div className="w-full bg-gray-100 rounded-full h-2">
                                            <div className={`${color} h-2 rounded-full`} style={{ width: `${pct}%` }}></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };
 
        const DonationForm = () => {
            const { setPage } = useContext(AuthContext);
            const { inventory, setInventory } = useContext(GlobalStateContext);
            const [desc, setDesc] = useState('');
            const [cat, setCat] = useState('Kazak');
            const [size, setSize] = useState('M');
            const [gender, setGender] = useState('Unisex');
            const [condition, setCondition] = useState('Yeni (Etiketli)');

            const handleDonate = (e) => {
                e.preventDefault();
                
                // Demo Image Mapping for Donor Intake
                const imgMap = {
                    'Kazak': 'https://loremflickr.com/800/600/knit+sweater?lock=104',
                    'Dış Giyim': 'https://loremflickr.com/800/600/black+puffer+jacket?lock=101',
                    'Üst Giyim': 'https://loremflickr.com/800/600/tshirt+shirt?lock=124',
                    'Alt Giyim': 'https://loremflickr.com/800/600/blue+jeans?lock=106',
                    'Ayakkabı': 'https://loremflickr.com/800/600/leather+boots?lock=109'
                };

                const newItem = {
                    id: Date.now(),
                    cat,
                    size,
                    gender,
                    condition,
                    status: 'Available',
                    desc: desc || "Bağışlanan Kıyafet",
                    img: imgMap[cat] || "https://loremflickr.com/800/600/hoodie?lock=105"
                };
                setInventory([newItem, ...inventory]);
                alert('Bağışınız başarıyla sisteme aktarıldı ve envantere eklendi!');
                setPage('landing');
            };

            return (
                <div className="p-6 min-h-screen flex items-center justify-center">
                    <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-lg w-full border border-gray-100">
                        <button onClick={() => setPage('landing')} className="text-xs font-bold text-gray-400 mb-6 flex items-center gap-1 hover:text-[#003865]">
                            <Icon name="arrow-left" className="w-4 h-4" /> Ana Sayfaya Dön
                        </button>
                        <h2 className="text-2xl font-black text-gray-900 mb-1">Hızlı Bağış Sistemi</h2>
                        <p className="text-gray-400 text-xs mb-6 font-medium">Bu ekrandan eklediğiniz ürün anlık olarak envantere yansır.</p>
                        
                        <form className="space-y-4" onSubmit={handleDonate}>
                            <div>
                                <label className="text-xs font-bold text-gray-500">Giysi Açıklaması / Adı</label>
                                <input value={desc} onChange={e => setDesc(e.target.value)} className="w-full mt-1 p-3 border border-gray-200 rounded-xl bg-gray-50 outline-none focus:border-[#003865] focus:bg-white transition" placeholder="Örn: Kırmızı Sweatshirt" required />
                            </div>
                            
                            <div>
                                <label className="text-xs font-bold text-gray-500">Kategori</label>
                                <select value={cat} onChange={e => setCat(e.target.value)} className="w-full mt-1 p-3 border border-gray-200 rounded-xl bg-gray-50 outline-none font-medium transition focus:border-[#003865] focus:bg-white transition">
                                    <option>Kazak</option>
                                    <option>Dış Giyim</option>
                                    <option>Alt Giyim</option>
                                    <option>Ayakkabı</option>
                                    <option>Üst Giyim</option>
                                </select>
                            </div>

                            <div className="grid grid-cols-2 gap-3">
                                <div>
                                    <label className="text-xs font-bold text-gray-500">Beden</label>
                                    <input value={size} onChange={e => setSize(e.target.value)} className="w-full mt-1 p-3 border border-gray-200 rounded-xl bg-gray-50 outline-none transition focus:border-[#003865] focus:bg-white transition" placeholder="S, M, L, 42" required />
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-gray-500">Tür / Cinsiyet</label>
                                    <select value={gender} onChange={e => setGender(e.target.value)} className="w-full mt-1 p-3 border border-gray-200 rounded-xl bg-gray-50 outline-none font-medium transition focus:border-[#003865] focus:bg-white transition">
                                        <option>Unisex</option>
                                        <option>Erkek</option>
                                        <option>Kadın</option>
                                    </select>
                                </div>
                            </div>

                            <div>
                                <label className="text-xs font-bold text-gray-500">Ürün Durumu (Yıpranma)</label>
                                <select value={condition} onChange={e => setCondition(e.target.value)} className="w-full mt-1 p-3 border border-gray-200 rounded-xl bg-gray-50 outline-none font-medium transition focus:border-[#003865] focus:bg-white transition">
                                    <option>Yeni (Etiketli)</option>
                                    <option>Yeni (Etiketsiz)</option>
                                    <option>2. El (Çok Az Kullanılmış)</option>
                                    <option>2. El (Az Kullanılmış)</option>
                                    <option>2. El (Orta Kullanılmış)</option>
                                </select>
                            </div>
                            
                            <button className="w-full bg-emerald-500 text-white font-bold py-4 rounded-xl hover:bg-emerald-600 transition-all shadow-md mt-2 text-lg">
                                Bağışı Envantere Gönder (Canlı)
                            </button>
                        </form>
                    </div>
                </div>
            );
        };
 
        const App = () => {
            const [user, setUser] = useState(null);
            const [page, setPage] = useState('landing');
            const [selectedRole, setSelectedRole] = useState(null);
            
            // Shared Live Global State
            const [inventory, setInventory] = useState(INITIAL_INVENTORY);
            const [reservations, setReservations] = useState([]);
            const [users, setUsers] = useState(INITIAL_USERS);
 
            const login = (userData) => { setUser(userData); setPage(userData.role); };
            const logout = () => { setUser(null); setPage('landing'); };
 
            return (
                <AuthContext.Provider value={{ user, login, logout, setPage, selectedRole, setSelectedRole }}>
                    <GlobalStateContext.Provider value={{ inventory, setInventory, reservations, setReservations, users, setUsers }}>
                        <div className="min-h-screen bg-gray-50">
                            <Header />
                            {page === 'landing' && <LandingPage />}
                            {page === 'auth' && <AuthPage />}
                            {page === 'student' && <StudentDashboard />}
                            {page === 'coordinator' && <CoordinatorPanel />}
                            {page === 'admin' && <AdminDashboard />}
                            {page === 'donor' && <DonationForm />}
                        </div>
                    </GlobalStateContext.Provider>
                </AuthContext.Provider>
            );
        };
 
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
